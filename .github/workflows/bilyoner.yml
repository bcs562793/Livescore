name: Fikstür Senkronizasyonu

on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * *'       # Her gün 00:30 TR (UTC+3 = UTC 21:00)

jobs:
  sync:
    name: Bilyoner → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Fikstür senkronizasyonu
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: dart run sync_fixtures.dart
