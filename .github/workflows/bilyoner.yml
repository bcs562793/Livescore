name: Bilyoner Bağlantı Testi

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  test:
    name: Bilyoner API Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Bilyoner bağlantı testi
        run: dart run test_bilyoner.dart
