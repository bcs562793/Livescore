name: Mackolik Visual Daily Sync

on:
  schedule:
    - cron: '0 0,7,14,21 * * *'    # 00:00, 07:00, 14:00, 21:00 UTC
    - cron: '30 3,10,17 * * *'     # 03:30, 10:30, 17:30 UTC
  workflow_dispatch:               # Manuel tetikleme

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run daily visual sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: dart run mackolik_visual_daily.dart
