name: Stats Bot

on:
  workflow_dispatch:
    inputs:
      mackolik_ids:
        description: 'Mackolik ID (birden fazla için virgülle ayır: 4418306,4418307)'
        required: true
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run Stats Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          MACKOLIK_IDS: ${{ github.event.inputs.mackolik_ids }}
        run: dart run stats_bot.dart
