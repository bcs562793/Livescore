name: Mackolik Visual Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bağımlılıkları yükle
        run: dart pub get

      - name: Mackolik Visual URL Testi
        run: dart run mackolik_visual_test.dart
