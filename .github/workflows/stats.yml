name: Test Mackolik Stats Bot Block

on:
  workflow_dispatch:
    inputs:
      match_id:
        description: 'Test edilecek Mackolik Maç ID (Örn: 3656113)'
        required: true
        default: '3656113'
      request_count:
        description: 'Kaç ardışık istek atılsın?'
        required: true
        default: '10'
      delay_ms:
        description: 'İstekler arası bekleme süresi (ms)'
        required: true
        default: '1500'

jobs:
  test-bot-block:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Create and Run Dart Test Script
        run: |
          cat << 'EOF' > test_stats.dart
          import 'dart:io';
          import 'dart:convert';

          Future<void> main(List<String> args) async {
            final matchId = args.isNotEmpty ? args[0] : '3656113';
            final count = args.length > 1 ? int.parse(args[1]) : 10;
            final delay = args.length > 2 ? int.parse(args[2]) : 1500;

            final url = Uri.parse('https://arsiv.mackolik.com/AjaxHandlers/MatchHandler.aspx?command=optaStats&id=$matchId');
            final client = HttpClient();

            print('🚀 Mackolik Stats Bot Testi Başlıyor...');
            print('📌 Maç ID: $matchId | İstek Sayısı: $count | Bekleme: ${delay}ms\n');

            for (int i = 1; i <= count; i++) {
              final stopwatch = Stopwatch()..start();
              try {
                final req = await client.getUrl(url);
                
                // Worker kodundaki Ajax header'larının birebir aynısı
                req.headers.set('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36');
                req.headers.set('Accept', 'application/json, text/javascript, */*; q=0.01');
                req.headers.set('Accept-Language', 'tr-TR,tr;q=0.9,en-US;q=0.8,en;q=0.7');
                req.headers.set('X-Requested-With', 'XMLHttpRequest');
                req.headers.set('Referer', 'https://arsiv.mackolik.com/Mac/$matchId/');
                req.headers.set('Sec-Fetch-Dest', 'empty');
                req.headers.set('Sec-Fetch-Mode', 'cors');
                req.headers.set('Sec-Fetch-Site', 'same-origin');

                final res = await req.close();
                final bodyBytes = await _readResponse(res);
                final body = utf8.decode(bodyBytes, allowMalformed: true).trim();
                stopwatch.stop();

                // Bot engeli kontrolü (Worker kodundaki mantık)
                bool isBlocked = res.statusCode == 403 || 
                                 res.statusCode == 429 || 
                                 body.isEmpty || 
                                 body.startsWith('<html') || 
                                 body.startsWith('<!DOCTYPE') ||
                                 body.contains('Incapsula');

                String statusMarker = isBlocked ? '❌ BLOCKED' : '✅ SUCCESS';
                print('[$i/$count] $statusMarker (HTTP ${res.statusCode}) - ${stopwatch.elapsedMilliseconds}ms');

                if (isBlocked) {
                   String snippet = body.length > 120 ? body.substring(0, 120).replaceAll('\n', ' ') + '...' : body;
                   print('   📝 Yanıt Özeti: $snippet\n');
                } else {
                   print('   📊 Stats OK: ${body.length} byte alındı\n');
                }

              } catch (e) {
                print('[$i/$count] ❌ HATA: $e\n');
              }

              if (i < count) {
                await Future.delayed(Duration(milliseconds: delay));
              }
            }
            client.close();
          }

          Future<List<int>> _readResponse(HttpClientResponse response) async {
            final builder = BytesBuilder();
            await for (final chunk in response) { builder.add(chunk); }
            return builder.takeBytes();
          }
          EOF

          dart test_stats.dart ${{ github.event.inputs.match_id }} ${{ github.event.inputs.request_count }} ${{ github.event.inputs.delay_ms }}
