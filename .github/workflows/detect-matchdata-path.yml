# .github/workflows/detect-matchdata-path.yml
name: Detect Mackolik MatchData Path

on:
  workflow_dispatch:
    inputs:
      mac_id:
        description: 'Mackolik maç ID'
        required: true
        default: '4448054'

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Mac sayfasindan Match.js URL bul
        id: find_js
        run: |
          MAC_ID="${{ github.event.inputs.mac_id }}"
          echo "Mac sayfasi cekiliyor: https://arsiv.mackolik.com/Mac/$MAC_ID/"

          curl -s --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,*/*;q=0.9" \
            -H "Accept-Language: tr-TR,tr;q=0.9" \
            -H "Referer: https://arsiv.mackolik.com/" \
            "https://arsiv.mackolik.com/Mac/$MAC_ID/" \
            -o /tmp/page.html

          echo "HTML boyutu: $(wc -c < /tmp/page.html)"

          python3 << 'PYEOF'
          import re

          with open('/tmp/page.html', 'r', encoding='utf-8', errors='replace') as f:
              html = f.read()

          print(f"HTML uzunluk: {len(html)}")

          # Match.js URL bul
          matches = re.findall(r'https?://cm\.mackolik\.com[^\s"\']+Match\.js[^\s"\']*', html)
          print(f"\n--- Match.js referanslari ---")
          for m in set(matches):
              print(m)

          # Tum cm.mackolik.com JS dosyalari
          all_js = re.findall(r'https?://cm\.mackolik\.com[^\s"\']+\.js[^\s"\']*', html)
          print(f"\n--- Tum cm.mackolik.com JS dosyalari ---")
          for m in sorted(set(all_js)):
              print(m)

          # JS_URL'i kaydet
          if matches:
              js_url = list(set(matches))[0]
              with open('/tmp/js_url.txt', 'w') as f:
                  f.write(js_url)
              print(f"\nKaydedildi: {js_url}")
          else:
              print("\nMatch.js BULUNAMADI")
              with open('/tmp/js_url.txt', 'w') as f:
                  f.write('')
          PYEOF

      - name: Step 2 - Match.js icinden MatchData path bul
        run: |
          MAC_ID="${{ github.event.inputs.mac_id }}"
          JS_URL=$(cat /tmp/js_url.txt)

          if [ -z "$JS_URL" ]; then
            echo "JS_URL bos, Step 1 basarisiz"
            exit 1
          fi

          echo "Match.js cekiliyor: $JS_URL"
          sleep 1

          curl -s --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Referer: https://arsiv.mackolik.com/Mac/$MAC_ID/" \
            "$JS_URL" \
            -o /tmp/match.js

          echo "JS boyutu: $(wc -c < /tmp/match.js)"

          python3 << 'PYEOF'
          import re

          with open('/tmp/match.js', 'r', encoding='utf-8', errors='replace') as f:
              js = f.read()

          print(f"JS uzunluk: {len(js)}")

          print("\n--- APP_ROOT + path satirlari ---")
          for m in re.findall(r'.{0,40}APP_ROOT.{0,150}', js):
              print(m.strip())

          print("\n--- t=dtl iceren satirlar ---")
          for m in re.findall(r'.{0,60}t=dtl.{0,80}', js):
              print(m.strip())

          print("\n--- MatchData.aspx referanslari ---")
          for m in set(re.findall(r'["\'][^"\']*MatchData[^"\']*["\']', js)):
              print(m)

          print("\n--- Tum /Match/ pathleri ---")
          for m in sorted(set(re.findall(r'["\'][/][^"\']*Match[^"\']*["\']', js))):
              print(m)
          PYEOF

      - name: Step 3 - Dogrulama
        run: |
          MAC_ID="${{ github.event.inputs.mac_id }}"
          TEST_URL="https://arsiv.mackolik.com/Match/MatchData.aspx?t=dtl&id=$MAC_ID&s=0"
          echo "Test URL: $TEST_URL"

          curl -s --max-time 10 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: */*" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Referer: https://arsiv.mackolik.com/Mac/$MAC_ID/" \
            -w "\nHTTP_STATUS:%{http_code}\nBOYUT:%{size_download}\n" \
            "$TEST_URL" | tail -3
