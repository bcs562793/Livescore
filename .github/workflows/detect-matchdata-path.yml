# .github/workflows/detect-matchdata-path.yml
name: Detect Mackolik MatchData Path

on:
  workflow_dispatch:
    inputs:
      mac_id:
        description: 'Mackolik maç ID'
        required: true
        default: '4448054'

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Sayfayi cek ve icerigini incele
        run: |
          MAC_ID="${{ github.event.inputs.mac_id }}"

          curl -s --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,*/*;q=0.9" \
            -H "Accept-Language: tr-TR,tr;q=0.9" \
            -H "Referer: https://arsiv.mackolik.com/" \
            -L \
            "https://arsiv.mackolik.com/Mac/$MAC_ID/" \
            -o /tmp/page.html \
            -w "HTTP_STATUS:%{http_code}\nFINAL_URL:%{url_effective}\n"

          echo ""
          echo "Dosya boyutu: $(wc -c < /tmp/page.html)"
          echo "Ilk 500 karakter:"
          head -c 500 /tmp/page.html
          echo ""
          echo "..."

          python3 << 'PYEOF'
          import re

          with open('/tmp/page.html', 'r', encoding='utf-8', errors='replace') as f:
              html = f.read()

          print(f"\nToplam HTML: {len(html)} karakter")

          # Sayfa bot engeline mi takıldı?
          if len(html) < 1000:
              print("UYARI: Sayfa cok kisa, bot engeli olabilir")
              print("Tam icerik:")
              print(html)
          else:
              # Script taglerini listele
              scripts = re.findall(r'<script[^>]*src=["\']([^"\']+)["\']', html, re.IGNORECASE)
              print(f"\n--- Tum <script src> tagleri ({len(scripts)} adet) ---")
              for s in scripts:
                  print(s)

              # mackolik referanslari
              mac_refs = re.findall(r'(?:mackolik|cm\.mackolik)[^\s"\'<>]+', html, re.IGNORECASE)
              print(f"\n--- mackolik referanslari ---")
              for m in sorted(set(mac_refs))[:30]:
                  print(m)

              # JS dosyalari
              js_files = re.findall(r'["\']([^"\']*\.js[^"\']*)["\']', html)
              print(f"\n--- JS dosyalari ---")
              for j in sorted(set(js_files))[:30]:
                  print(j)

              # matchId var mi
              mid = re.findall(r'.{0,30}matchId.{0,50}', html)
              print(f"\n--- matchId referanslari ---")
              for m in mid[:5]:
                  print(m.strip())
          PYEOF
