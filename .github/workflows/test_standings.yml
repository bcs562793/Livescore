name: Test Mackolik Standings Parser

on:
  workflow_dispatch:

jobs:
  test-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # DÜZELTİLEN KISIM: Sadece Dart yerine Flutter'ı (ve dolayısıyla içindeki Dart'ı) kuruyoruz
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. ADIM: Artık sistem Flutter'ı tanıdığı için bu adım hata vermeyecek
      - name: Install Dependencies
        run: flutter pub get

      # 2. ADIM: Kodu çalıştır
      - name: Run Standings Test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: dart run test_standings.dart
