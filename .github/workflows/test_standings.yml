name: Test Mackolik Standings Parser

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      # 1. ADIM: Paketleri indir (Eksik olan kısım buydu veya atlanmıştı)
      - name: Install Dependencies
        run: dart pub get

      # 2. ADIM: Kodu çalıştır
      - name: Run Standings Test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: dart run test_standings.dart
